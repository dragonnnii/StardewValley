name: Build Mod

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 6.0.x # Required for Stardew 1.6

      - name: Restore dependencies
        run: dotnet restore

      - name: Build Mod
        run: dotnet build WizardrySkill/WizardrySkill.csproj -c Release

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WizardrySkill-Build
          path: WizardrySkill/bin/Release/net6.0/WizardrySkill.dll
          
